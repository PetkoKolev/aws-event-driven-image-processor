name: Deploy AWS Image Processor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build Lambda package (Linux compatible)
        working-directory: image-processing-pipeline/lambda
        run: |
          mkdir -p build
          pip install -r requirements.txt -t build
          cp lambda_function.py build/
          cd build
          zip -r ../function.zip .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: image-processing-pipeline
        run: terraform init

      - name: Terraform Apply
        working-directory: image-processing-pipeline
        run: terraform apply -auto-approve